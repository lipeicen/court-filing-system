<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑案件 - {{ case.case_no }} - 法院保全案件管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f7fa; color: #333; }
        .header { background: #1a237e; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; }
        .header a { color: white; text-decoration: none; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .form-card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 30px; }
        .form-card h2 { margin-bottom: 25px; color: #1a237e; border-bottom: 2px solid #e9ecef; padding-bottom: 15px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full { grid-column: 1 / -1; }
        .form-group label { font-weight: 600; margin-bottom: 6px; color: #555; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea {
            padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; border-color: #1a237e;
        }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .section-title { font-size: 16px; font-weight: 600; color: #1a237e; margin: 25px 0 15px; padding-bottom: 8px; border-bottom: 1px solid #e9ecef; }
        .btn-group { display: flex; gap: 15px; margin-top: 30px; }
        .btn { padding: 12px 30px; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; text-decoration: none; }
        .btn-primary { background: #1a237e; color: white; }
        .btn-primary:hover { background: #283593; }
        .btn-secondary { background: #e9ecef; color: #555; }
        .btn-secondary:hover { background: #dee2e6; }
        .flash { padding: 12px 20px; margin-bottom: 20px; border-radius: 4px; }
        .flash-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .flash-error { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        .readonly { background: #f8f9fa; color: #666; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏛️ 法院保全案件管理系统</h1>
        <a href="/case/{{ case.id }}">← 返回详情</a>
    </div>
    
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <div class="form-card">
            <h2>✏️ 编辑案件 - {{ case.case_no }}</h2>
            <form method="POST" action="/case/{{ case.id }}/edit">
                
                <div class="section-title">案件基本信息</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>案件编号（只读）</label>
                        <input type="text" value="{{ case.case_no }}" class="readonly" readonly>
                    </div>
                    <div class="form-group">
                        <label>案件名称</label>
                        <input type="text" name="case_name" value="{{ case.case_name or '' }}" placeholder="如：借款合同纠纷-诉前保全">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>保全类型</label>
                        <select name="preserve_type">
                            <option value="诉讼保全" {{ 'selected' if case.preserve_type == '诉讼保全' else '' }}>诉讼保全</option>
                            <option value="诉前保全" {{ 'selected' if case.preserve_type == '诉前保全' else '' }}>诉前保全</option>
                            <option value="证据保全" {{ 'selected' if case.preserve_type == '证据保全' else '' }}>证据保全</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>案由</label>
                        <input type="text" name="case_reason" value="{{ case.case_reason or '' }}" placeholder="如：借款合同纠纷">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>受理法院</label>
                        <input type="text" name="court_name" value="{{ case.court_name or '' }}" placeholder="如：北京市朝阳区人民法院">
                    </div>
                    <div class="form-group">
                        <label>保全金额（元）</label>
                        <input type="number" name="preserve_amount" value="{{ case.preserve_amount or '0' }}" placeholder="0.00" step="0.01">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>送达地址</label>
                        <input type="text" name="delivery_address" value="{{ case.delivery_address or '' }}" placeholder="法律文书送达地址">
                    </div>
                    <div class="form-group">
                        <label>联系人电话</label>
                        <input type="text" name="contact_phone" value="{{ case.contact_phone or '' }}" placeholder="联系人手机号">
                    </div>
                </div>
                
                
                <div class="section-title">申请人信息</div>
                
                <!-- 申请人类型切换 -->
                <div class="party-type-tabs">
                    <label class="party-tab">
                        <input type="radio" name="applicant_type" value="自然人" {% if case.applicant_type == '自然人' or not case.applicant_type %}checked{% endif %} onchange="toggleApplicantFields()">
                        <span>自然人</span>
                    </label>
                    <label class="party-tab">
                        <input type="radio" name="applicant_type" value="法人" {% if case.applicant_type == '法人' %}checked{% endif %} onchange="toggleApplicantFields()">
                        <span>法人</span>
                    </label>
                    <label class="party-tab">
                        <input type="radio" name="applicant_type" value="非法人组织" {% if case.applicant_type == '非法人组织' %}checked{% endif %} onchange="toggleApplicantFields()">
                        <span>非法人组织</span>
                    </label>
                </div>
                
                <!-- 申请人-自然人字段 -->
                <div id="applicant-natural">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">姓名</label>
                            <input type="text" name="applicant_name" value="{{ case.applicant_name or '' }}" placeholder="姓名">
                        </div>
                        <div class="form-group">
                            <label class="required">国别或地区</label>
                            <select name="applicant_country">
                                <option value="中国" {% if case.applicant_country == '中国' or not case.applicant_country %}selected{% endif %}>中国</option>
                                <option value="中国香港" {% if case.applicant_country == '中国香港' %}selected{% endif %}>中国香港</option>
                                <option value="中国澳门" {% if case.applicant_country == '中国澳门' %}selected{% endif %}>中国澳门</option>
                                <option value="中国台湾省" {% if case.applicant_country == '中国台湾省' %}selected{% endif %}>中国台湾省</option>
                                <option value="美国" {% if case.applicant_country == '美国' %}selected{% endif %}>美国</option>
                                <option value="日本" {% if case.applicant_country == '日本' %}selected{% endif %}>日本</option>
                                <option value="韩国" {% if case.applicant_country == '韩国' %}selected{% endif %}>韩国</option>
                                <option value="新加坡" {% if case.applicant_country == '新加坡' %}selected{% endif %}>新加坡</option>
                                <option value="英国" {% if case.applicant_country == '英国' %}selected{% endif %}>英国</option>
                                <option value="德国" {% if case.applicant_country == '德国' %}selected{% endif %}>德国</option>
                                <option value="法国" {% if case.applicant_country == '法国' %}selected{% endif %}>法国</option>
                                <option value="俄罗斯" {% if case.applicant_country == '俄罗斯' %}selected{% endif %}>俄罗斯</option>
                                <option value="加拿大" {% if case.applicant_country == '加拿大' %}selected{% endif %}>加拿大</option>
                                <option value="其他" {% if case.applicant_country == '其他' %}selected{% endif %}>其他</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">证件类型</label>
                            <select name="applicant_cert_type">
                                <option value="居民身份证" {% if case.applicant_cert_type == '居民身份证' or not case.applicant_cert_type %}selected{% endif %}>居民身份证</option>
                                <option value="中国公民护照" {% if case.applicant_cert_type == '中国公民护照' %}selected{% endif %}>中国公民护照</option>
                                <option value="台湾居民来往大陆通行证" {% if case.applicant_cert_type == '台湾居民来往大陆通行证' %}selected{% endif %}>台湾居民来往大陆通行证</option>
                                <option value="港澳居民来往内地通行证" {% if case.applicant_cert_type == '港澳居民来往内地通行证' %}selected{% endif %}>港澳居民来往内地通行证</option>
                                <option value="外国公民护照" {% if case.applicant_cert_type == '外国公民护照' %}selected{% endif %}>外国公民护照</option>
                                <option value="户口簿" {% if case.applicant_cert_type == '户口簿' %}selected{% endif %}>户口簿</option>
                                <option value="其他" {% if case.applicant_cert_type == '其他' %}selected{% endif %}>其他</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="required">证件号码</label>
                            <input type="text" name="applicant_cert_no" value="{{ case.applicant_cert_no or '' }}" placeholder="证件号码">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">出生日期</label>
                            <input type="date" name="applicant_birth" value="{{ case.applicant_birth or '' }}">
                        </div>
                        <div class="form-group">
                            <label>年龄</label>
                            <input type="number" name="applicant_age" value="{{ case.applicant_age or '' }}" placeholder="岁" min="0">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">性别</label>
                            <div class="radio-group">
                                <label><input type="radio" name="applicant_gender" value="男" {% if case.applicant_gender == '男性' or case.applicant_gender == '男' or not case.applicant_gender %}checked{% endif %}> 男性</label>
                                <label><input type="radio" name="applicant_gender" value="女" {% if case.applicant_gender == '女' %}checked{% endif %}> 女性</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="required">民族</label>
                            <select name="applicant_nation">
                                <option value="汉族" {% if case.applicant_nation == '汉族' or not case.applicant_nation %}selected{% endif %}>汉族</option>
                                <option value="蒙古族" {% if case.applicant_nation == '蒙古族' %}selected{% endif %}>蒙古族</option>
                                <option value="回族" {% if case.applicant_nation == '回族' %}selected{% endif %}>回族</option>
                                <option value="藏族" {% if case.applicant_nation == '藏族' %}selected{% endif %}>藏族</option>
                                <option value="维吾尔族" {% if case.applicant_nation == '维吾尔族' %}selected{% endif %}>维吾尔族</option>
                                <option value="苗族" {% if case.applicant_nation == '苗族' %}selected{% endif %}>苗族</option>
                                <option value="彝族" {% if case.applicant_nation == '彝族' %}selected{% endif %}>彝族</option>
                                <option value="壮族" {% if case.applicant_nation == '壮族' %}selected{% endif %}>壮族</option>
                                <option value="其他" {% if case.applicant_nation == '其他' %}selected{% endif %}>其他</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">手机号码</label>
                            <input type="text" name="applicant_phone" value="{{ case.applicant_phone or '' }}" placeholder="11位手机号">
                        </div>
                        <div class="form-group">
                            <label>固定电话</label>
                            <div class="tel-group">
                            <label>固定电话</label>
                            <div class="tel-group">
                                <input type="text" name="applicant_tel_area" placeholder="区号" style="width:30%" value="{{ (case.applicant_tel or '').split('-')[0] if case.applicant_tel and '-' in case.applicant_tel else '' }}">
                                <input type="text" name="applicant_tel_phone" placeholder="电话" style="width:40%" value="{{ (case.applicant_tel or '').split('-')[1] if case.applicant_tel and '-' in case.applicant_tel else (case.applicant_tel or '') }}">
                                <input type="text" name="applicant_tel_ext" placeholder="分机" style="width:30%" value="{{ (case.applicant_tel or '').split('-')[2] if case.applicant_tel and '-' in (case.applicant_tel or '') and (case.applicant_tel or '').split('-')|length > 2 else '' }}">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group full">
                            <label class="required">经常居住地</label>
                            <input type="text" name="applicant_address" value="{{ case.applicant_address or '' }}" placeholder="详细地址">
                        </div>
                    </div>
                </div>
                
                <!-- 申请人-法人/非法人组织字段 -->
                <div id="applicant-org" style="display:none;">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">单位名称</label>
                            <input type="text" name="applicant_org_name" value="{{ case.applicant_name or '' }}" placeholder="单位全称">
                        </div>
                        <div class="form-group">
                            <label class="required">证照类型</label>
                            <select name="applicant_org_cert_type">
                                <option value="统一社会信用代码证" selected>统一社会信用代码证</option>
                                <option value="营业执照">营业执照</option>
                                <option value="组织机构代码证">组织机构代码证</option>
                                <option value="事业法人登记证">事业法人登记证</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">证照号码</label>
                            <input type="text" name="applicant_org_cert_no" value="{{ case.applicant_uscc or '' }}" placeholder="统一社会信用代码">
                        </div>
                        <div class="form-group">
                            <label>单位性质</label>
                            <select name="applicant_nature">
                                <option value="" {% if not case.applicant_nature %}selected{% endif %}>请选择单位性质</option>
                                <option value="机关" {% if case.applicant_nature == '机关' %}selected{% endif %}>机关</option>
                                <option value="事业单位" {% if case.applicant_nature == '事业单位' %}selected{% endif %}>事业单位</option>
                                <option value="企业" {% if case.applicant_nature == '企业' %}selected{% endif %}>企业</option>
                                <option value="有限责任公司" {% if case.applicant_nature == '有限责任公司' %}selected{% endif %}>有限责任公司</option>
                                <option value="有限责任公司" {% if case.applicant_nature == '有限责任公司' %}selected{% endif %}>有限责任公司</option>
                                <option value="社会团体" {% if case.applicant_nature == '社会团体' %}selected{% endif %}>社会团体</option>
                                <option value="民办非企业单位" {% if case.applicant_nature == '民办非企业单位' %}selected{% endif %}>民办非企业单位</option>
                                <option value="其他" {% if case.applicant_nature == '其他' %}selected{% endif %}>其他</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required" id="applicant-legal-label">法定代表人</label>
                            <input type="text" name="applicant_legal_person" value="{{ case.applicant_legal_person or '' }}" placeholder="姓名">
                        </div>
                        <div class="form-group">
                            <label class="required" id="applicant-legal-title-label">法定代表人职务</label>
                            <input type="text" name="applicant_legal_title" value="{{ case.applicant_legal_title or '' }}" placeholder="如：董事长">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">手机号码</label>
                            <input type="text" name="applicant_org_phone" value="{{ case.applicant_phone or '' }}" placeholder="11位手机号">
                        </div>
                        <div class="form-group">
                            <label>固定电话</label>
                            <div class="tel-group">
                                <input type="text" name="applicant_org_tel_area" placeholder="区号" style="width:30%">
                                <input type="text" name="applicant_org_tel_phone" placeholder="电话" style="width:40%">
                                <input type="text" name="applicant_org_tel_ext" placeholder="分机" style="width:30%">
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group full">
                            <label class="required">单位地址</label>
                            <input type="text" name="applicant_org_address" value="{{ case.applicant_address or '' }}" placeholder="实际经营地址">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">单位注册地</label>
                            <input type="text" name="applicant_reg_address" value="{{ case.applicant_reg_address or '' }}" placeholder="工商注册地址">
                        </div>
                        <div class="form-group">
                            <label class="required">注册地国别或地区</label>
                            <select name="applicant_reg_country">
                                <option value="中国" {% if case.applicant_reg_country == '中国' or not case.applicant_reg_country %}selected{% endif %}>中国</option>
                                <option value="中国香港" {% if case.applicant_reg_country == '中国香港' %}selected{% endif %}>中国香港</option>
                                <option value="中国澳门" {% if case.applicant_reg_country == '中国澳门' %}selected{% endif %}>中国澳门</option>
                                <option value="中国台湾省" {% if case.applicant_reg_country == '中国台湾省' %}selected{% endif %}>中国台湾省</option>
                                <option value="美国" {% if case.applicant_reg_country == '美国' %}selected{% endif %}>美国</option>
                                <option value="其他" {% if case.applicant_reg_country == '其他' %}selected{% endif %}>其他</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="section-title">被申请人信息</div>
                
                <!-- 被申请人类型切换 -->
                <div class="party-type-tabs">
                    <label class="party-tab">
                        <input type="radio" name="respondent_type" value="自然人" {% if case.respondent_type == '自然人' or not case.respondent_type %}checked{% endif %} onchange="toggleRespondentFields()">
                        <span>自然人</span>
                    </label>
                    <label class="party-tab">
                        <input type="radio" name="respondent_type" value="法人" {% if case.respondent_type == '法人' %}checked{% endif %} onchange="toggleRespondentFields()">
                        <span>法人</span>
                    </label>
                    <label class="party-tab">
                        <input type="radio" name="respondent_type" value="非法人组织" {% if case.respondent_type == '非法人组织' %}checked{% endif %} onchange="toggleRespondentFields()">
                        <span>非法人组织</span>
                    </label>
                </div>
                
                <!-- 被申请人-自然人字段 -->
                <div id="respondent-natural">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">姓名</label>
                            <input type="text" name="respondent_name" value="{{ case.respondent_name or '' }}" placeholder="姓名">
                        </div>
                        <div class="form-group">
                            <label class="required">国别或地区</label>
                            <select name="respondent_country">
                                <option value="中国" {% if case.respondent_country == '中国' or not case.respondent_country %}selected{% endif %}>中国</option>
                                <option value="中国香港" {% if case.respondent_country == '中国香港' %}selected{% endif %}>中国香港</option>
                                <option value="中国澳门" {% if case.respondent_country == '中国澳门' %}selected{% endif %}>中国澳门</option>
                                <option value="中国台湾省" {% if case.respondent_country == '中国台湾省' %}selected{% endif %}>中国台湾省</option>
                                <option value="美国" {% if case.respondent_country == '美国' %}selected{% endif %}>美国</option>
                                <option value="日本" {% if case.respondent_country == '日本' %}selected{% endif %}>日本</option>
                                <option value="韩国" {% if case.respondent_country == '韩国' %}selected{% endif %}>韩国</option>
                                <option value="新加坡" {% if case.respondent_country == '新加坡' %}selected{% endif %}>新加坡</option>
                                <option value="英国" {% if case.respondent_country == '英国' %}selected{% endif %}>英国</option>
                                <option value="德国" {% if case.respondent_country == '德国' %}selected{% endif %}>德国</option>
                                <option value="法国" {% if case.respondent_country == '法国' %}selected{% endif %}>法国</option>
                                <option value="俄罗斯" {% if case.respondent_country == '俄罗斯' %}selected{% endif %}>俄罗斯</option>
                                <option value="加拿大" {% if case.respondent_country == '加拿大' %}selected{% endif %}>加拿大</option>
                                <option value="其他" {% if case.respondent_country == '其他' %}selected{% endif %}>其他</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">证件类型</label>
                            <select name="respondent_cert_type">
                                <option value="居民身份证" {% if case.respondent_cert_type == '居民身份证' or not case.respondent_cert_type %}selected{% endif %}>居民身份证</option>
                                <option value="中国公民护照" {% if case.respondent_cert_type == '中国公民护照' %}selected{% endif %}>中国公民护照</option>
                                <option value="台湾居民来往大陆通行证" {% if case.respondent_cert_type == '台湾居民来往大陆通行证' %}selected{% endif %}>台湾居民来往大陆通行证</option>
                                <option value="港澳居民来往内地通行证" {% if case.respondent_cert_type == '港澳居民来往内地通行证' %}selected{% endif %}>港澳居民来往内地通行证</option>
                                <option value="外国公民护照" {% if case.respondent_cert_type == '外国公民护照' %}selected{% endif %}>外国公民护照</option>
                                <option value="户口簿" {% if case.respondent_cert_type == '户口簿' %}selected{% endif %}>户口簿</option>
                                <option value="其他" {% if case.respondent_cert_type == '其他' %}selected{% endif %}>其他</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="required">证件号码</label>
                            <input type="text" name="respondent_id" value="{{ case.respondent_id or '' }}" placeholder="证件号码">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">出生日期</label>
                            <input type="date" name="respondent_birth" value="{{ case.respondent_birth or '' }}">
                        </div>
                        <div class="form-group">
                            <label>年龄</label>
                            <input type="number" name="respondent_age" value="{{ case.respondent_age or '' }}" placeholder="岁" min="0">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">性别</label>
                            <div class="radio-group">
                                <label><input type="radio" name="respondent_gender" value="男" {% if case.respondent_gender == '男性' or case.respondent_gender == '男' or not case.respondent_gender %}checked{% endif %}> 男性</label>
                                <label><input type="radio" name="respondent_gender" value="女" {% if case.respondent_gender == '女性' or case.respondent_gender == '女' %}checked{% endif %}> 女性</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="required">民族</label>
                            <select name="respondent_nation">
                                <option value="汉族" {% if case.respondent_nation == '汉族' or not case.respondent_nation %}selected{% endif %}>汉族</option>
                                <option value="蒙古族" {% if case.respondent_nation == '蒙古族' %}selected{% endif %}>蒙古族</option>
                                <option value="回族" {% if case.respondent_nation == '回族' %}selected{% endif %}>回族</option>
                                <option value="藏族" {% if case.respondent_nation == '藏族' %}selected{% endif %}>藏族</option>
                                <option value="维吾尔族" {% if case.respondent_nation == '维吾尔族' %}selected{% endif %}>维吾尔族</option>
                                <option value="苗族" {% if case.respondent_nation == '苗族' %}selected{% endif %}>苗族</option>
                                <option value="彝族" {% if case.respondent_nation == '彝族' %}selected{% endif %}>彝族</option>
                                <option value="壮族" {% if case.respondent_nation == '壮族' %}selected{% endif %}>壮族</option>
                                <option value="其他" {% if case.respondent_nation == '其他' %}selected{% endif %}>其他</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">手机号码</label>
                            <input type="text" name="respondent_phone" value="{{ case.respondent_phone or '' }}" placeholder="11位手机号">
                        </div>
                        <div class="form-group">
                            <label>固定电话</label>
                            <div class="tel-group">
                                <input type="text" name="respondent_tel_area" placeholder="区号" style="width:30%" value="{{ (case.respondent_tel or '').split('-')[0] if case.respondent_tel and '-' in case.respondent_tel else '' }}">
                                <input type="text" name="respondent_tel_phone" placeholder="电话" style="width:40%" value="{{ (case.respondent_tel or '').split('-')[1] if case.respondent_tel and '-' in case.respondent_tel else (case.respondent_tel or '') }}">
                                <input type="text" name="respondent_tel_ext" placeholder="分机" style="width:30%" value="{{ (case.respondent_tel or '').split('-')[2] if case.respondent_tel and '-' in (case.respondent_tel or '') and (case.respondent_tel or '').split('-')|length > 2 else '' }}">
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group full">
                            <label class="required">经常居住地</label>
                            <input type="text" name="respondent_address" value="{{ case.respondent_address or '' }}" placeholder="详细地址">
                        </div>
                    </div>
                </div>
                
                <!-- 被申请人-法人/非法人组织字段 -->
                <div id="respondent-org" style="display:none;">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">单位名称</label>
                            <input type="text" name="respondent_org_name" value="{{ case.respondent_name or '' }}" placeholder="单位全称">
                        </div>
                        <div class="form-group">
                            <label class="required">证照类型</label>
                            <select name="respondent_org_cert_type">
                                <option value="统一社会信用代码证" selected>统一社会信用代码证</option>
                                <option value="营业执照">营业执照</option>
                                <option value="组织机构代码证">组织机构代码证</option>
                                <option value="事业法人登记证">事业法人登记证</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">证照号码</label>
                            <input type="text" name="respondent_org_cert_no" value="{{ case.respondent_uscc or '' }}" placeholder="统一社会信用代码">
                        </div>
                        <div class="form-group">
                            <label>单位性质</label>
                            <select name="respondent_nature">
                                <option value="" {% if not case.respondent_nature %}selected{% endif %}>请选择单位性质</option>
                                <option value="机关" {% if case.respondent_nature == '机关' %}selected{% endif %}>机关</option>
                                <option value="事业单位" {% if case.respondent_nature == '事业单位' %}selected{% endif %}>事业单位</option>
                                <option value="企业" {% if case.respondent_nature == '企业' %}selected{% endif %}>企业</option>
                                <option value="社会团体" {% if case.respondent_nature == '社会团体' %}selected{% endif %}>社会团体</option>
                                <option value="民办非企业单位" {% if case.respondent_nature == '民办非企业单位' %}selected{% endif %}>民办非企业单位</option>
                                <option value="其他" {% if case.respondent_nature == '其他' %}selected{% endif %}>其他</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required" id="respondent-legal-label">法定代表人</label>
                            <input type="text" name="respondent_legal_person" value="{{ case.respondent_legal_person or '' }}" placeholder="姓名">
                        </div>
                        <div class="form-group">
                            <label class="required" id="respondent-legal-title-label">法定代表人职务</label>
                            <input type="text" name="respondent_legal_title" value="{{ case.respondent_legal_title or '' }}" placeholder="如：董事长">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">手机号码</label>
                            <input type="text" name="respondent_org_phone" value="{{ case.respondent_phone or '' }}" placeholder="11位手机号">
                        </div>
                        <div class="form-group">
                            <label>固定电话</label>
                            <div class="tel-group">
                                <input type="text" name="respondent_org_tel_area" placeholder="区号" style="width:30%">
                                <input type="text" name="respondent_org_tel_phone" placeholder="电话" style="width:40%">
                                <input type="text" name="respondent_org_tel_ext" placeholder="分机" style="width:30%">
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group full">
                            <label class="required">单位地址</label>
                            <input type="text" name="respondent_org_address" value="{{ case.respondent_address or '' }}" placeholder="实际经营地址">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">单位注册地</label>
                            <input type="text" name="respondent_reg_address" value="{{ case.respondent_reg_address or '' }}" placeholder="工商注册地址">
                        </div>
                        <div class="form-group">
                            <label class="required">注册地国别或地区</label>
                            <select name="respondent_reg_country">
                                <option value="中国" {% if case.respondent_reg_country == '中国' or not case.respondent_reg_country %}selected{% endif %}>中国</option>
                                <option value="中国香港" {% if case.respondent_reg_country == '中国香港' %}selected{% endif %}>中国香港</option>
                                <option value="中国澳门" {% if case.respondent_reg_country == '中国澳门' %}selected{% endif %}>中国澳门</option>
                                <option value="中国台湾省" {% if case.respondent_reg_country == '中国台湾省' %}selected{% endif %}>中国台湾省</option>
                                <option value="美国" {% if case.respondent_reg_country == '美国' %}selected{% endif %}>美国</option>
                                <option value="其他" {% if case.respondent_reg_country == '其他' %}selected{% endif %}>其他</option>
                            </select>
                        </div>
                    </div>
                </div>
<div class="section-title">担保信息</div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>担保方式 <span style="color:red">*</span></label>
                        <select name="guarantee_type" id="guarantee_type" onchange="updateGuaranteeFields()">
                            {% for t in guarantee_types %}
                            <option value="{{ t }}" {{ 'selected' if case.guarantee_type == t else '' }}>{{ t }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>担保价值（元） <span style="color:red">*</span></label>
                        <input type="number" name="guarantee_value" value="{{ case.guarantee_value or '0' }}" placeholder="0.00" step="0.01">
                    </div>
                </div>
                
                <!-- 交纳保证金：只显示担保人（选填） -->
                <div class="form-row guarantee-field" id="field-guarantor" style="display:none">
                    <div class="form-group">
                        <label>担保人</label>
                        <input type="text" name="guarantor_name" value="{{ case.guarantor_name or '' }}" placeholder="请输入担保人">
                    </div>
                </div>
                
                <!-- 提供保证人：担保人（必填）、担保物名称（必填） -->
                <div class="form-row guarantee-field" id="field-guarantor-person" style="display:none">
                    <div class="form-group">
                        <label>担保人 <span style="color:red">*</span></label>
                        <input type="text" name="guarantor_name" value="{{ case.guarantor_name or '' }}" placeholder="请输入担保人">
                    </div>
                    <div class="form-group">
                        <label>担保物名称 <span style="color:red">*</span></label>
                        <input type="text" name="guarantee_object" value="{{ case.guarantee_object or '' }}" placeholder="请输入担保名称">
                    </div>
                </div>
                
                <!-- 设定质押：担保人（选填）、质押财产类型（必填） -->
                <div class="form-row guarantee-field" id="field-pledge" style="display:none">
                    <div class="form-group">
                        <label>担保人</label>
                        <input type="text" name="guarantor_name" value="{{ case.guarantor_name or '' }}" placeholder="请输入担保人">
                    </div>
                    <div class="form-group">
                        <label>质押财产类型 <span style="color:red">*</span></label>
                        <select name="pledge_property_type">
                            <option value="" {{ 'selected' if not case.pledge_property_type else '' }}>请选择</option>
                            <option value="存款" {{ 'selected' if case.pledge_property_type == '存款' else '' }}>存款</option>
                            <option value="房产" {{ 'selected' if case.pledge_property_type == '房产' else '' }}>房产</option>
                            <option value="土地" {{ 'selected' if case.pledge_property_type == '土地' else '' }}>土地</option>
                            <option value="车辆" {{ 'selected' if case.pledge_property_type == '车辆' else '' }}>车辆</option>
                            <option value="机器设备" {{ 'selected' if case.pledge_property_type == '机器设备' else '' }}>机器设备</option>
                            <option value="现金" {{ 'selected' if case.pledge_property_type == '现金' else '' }}>现金</option>
                            <option value="股票" {{ 'selected' if case.pledge_property_type == '股票' else '' }}>股票</option>
                        </select>
                    </div>
                </div>
                
                <!-- 设定抵押：担保人（选填）、抵押财产类型（必填） -->
                <div class="form-row guarantee-field" id="field-mortgage" style="display:none">
                    <div class="form-group">
                        <label>担保人</label>
                        <input type="text" name="guarantor_name" value="{{ case.guarantor_name or '' }}" placeholder="请输入担保人">
                    </div>
                    <div class="form-group">
                        <label>抵押财产类型 <span style="color:red">*</span></label>
                        <select name="mortgage_property_type">
                            <option value="" {{ 'selected' if not case.mortgage_property_type else '' }}>请选择</option>
                            <option value="房产" {{ 'selected' if case.mortgage_property_type == '房产' else '' }}>房产</option>
                            <option value="土地" {{ 'selected' if case.mortgage_property_type == '土地' else '' }}>土地</option>
                            <option value="车辆" {{ 'selected' if case.mortgage_property_type == '车辆' else '' }}>车辆</option>
                            <option value="机器设备" {{ 'selected' if case.mortgage_property_type == '机器设备' else '' }}>机器设备</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group" style="flex: 2">
                        <label>担保说明</label>
                        <textarea name="guarantee_remark" placeholder="请输入内容" style="min-height: 80px; resize: vertical;">{{ case.guarantee_remark or '' }}</textarea>
                    </div>
                </div>
                
                <script>
    function toggleApplicantFields() {
        var type = document.querySelector('input[name="applicant_type"]:checked').value;
        if (type === '自然人') {
            document.getElementById('applicant-natural').style.display = 'block';
            document.getElementById('applicant-org').style.display = 'none';
        } else {
            document.getElementById('applicant-natural').style.display = 'none';
            document.getElementById('applicant-org').style.display = 'block';
            var legalLabel = document.getElementById('applicant-legal-label');
            var legalTitleLabel = document.getElementById('applicant-legal-title-label');
            if (type === '法人') {
                legalLabel.textContent = '法定代表人';
                legalTitleLabel.textContent = '法定代表人职务';
            } else {
                legalLabel.textContent = '主要负责人';
                legalTitleLabel.textContent = '主要负责人职务';
            }
        }
    }
    
    function toggleRespondentFields() {
        var type = document.querySelector('input[name="respondent_type"]:checked').value;
        if (type === '自然人') {
            document.getElementById('respondent-natural').style.display = 'block';
            document.getElementById('respondent-org').style.display = 'none';
        } else {
            document.getElementById('respondent-natural').style.display = 'none';
            document.getElementById('respondent-org').style.display = 'block';
            var legalLabel = document.getElementById('respondent-legal-label');
            var legalTitleLabel = document.getElementById('respondent-legal-title-label');
            if (type === '法人') {
                legalLabel.textContent = '法定代表人';
                legalTitleLabel.textContent = '法定代表人职务';
            } else {
                legalLabel.textContent = '主要负责人';
                legalTitleLabel.textContent = '主要负责人职务';
            }
        }
    }
    
    function updateGuaranteeFields() {
        var type = document.querySelector('select[name="guarantee_type"]').value;
        // 隐藏所有担保字段
        document.querySelectorAll('.guarantee-field').forEach(function(el) {
            el.style.display = 'none';
        });
        // 显示对应字段
        if (type === '提供保证人') {
            document.getElementById('field-guarantor-person').style.display = 'block';
        } else if (type === '设定质押') {
            document.getElementById('field-pledge').style.display = 'block';
        } else if (type === '设定抵押') {
            document.getElementById('field-mortgage').style.display = 'block';
        } else if (type === '交纳保证金') {
            document.getElementById('field-guarantor').style.display = 'block';
        }
    }
    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
        toggleApplicantFields();
        toggleRespondentFields();
        updateGuaranteeFields();
    });
    
    // Sync org fields to base fields on submit
    document.querySelector('form').addEventListener('submit', function(e) {
        var appType = document.querySelector('input[name="applicant_type"]:checked').value;
        if (appType !== '自然人') {
            document.querySelector('input[name="applicant_name"]').value = document.querySelector('input[name="applicant_org_name"]').value;
            document.querySelector('input[name="applicant_cert_type"]').value = document.querySelector('select[name="applicant_org_cert_type"]').value;
            document.querySelector('input[name="applicant_uscc"]').value = document.querySelector('input[name="applicant_org_cert_no"]').value;
            document.querySelector('input[name="applicant_phone"]').value = document.querySelector('input[name="applicant_org_phone"]').value;
            document.querySelector('input[name="applicant_address"]').value = document.querySelector('input[name="applicant_org_address"]').value;
        }
        var respType = document.querySelector('input[name="respondent_type"]:checked').value;
        if (respType !== '自然人') {
            document.querySelector('input[name="respondent_name"]').value = document.querySelector('input[name="respondent_org_name"]').value;
            document.querySelector('input[name="respondent_cert_type"]').value = document.querySelector('select[name="respondent_org_cert_type"]').value;
            document.querySelector('input[name="respondent_uscc"]').value = document.querySelector('input[name="respondent_org_cert_no"]').value;
            document.querySelector('input[name="respondent_phone"]').value = document.querySelector('input[name="respondent_org_phone"]').value;
            document.querySelector('input[name="respondent_address"]').value = document.querySelector('input[name="respondent_org_address"]').value;
        }
    });
    </script>
                
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">💾 保存修改</button>
                    <a href="/case/{{ case.id }}" class="btn btn-secondary">取消</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
