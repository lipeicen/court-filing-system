<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增案件 - 法院保全案件管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f7fa; color: #333; }
        .header { background: #1a237e; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; }
        .header a { color: white; text-decoration: none; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .form-card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 30px; }
        .form-card h2 { margin-bottom: 25px; color: #1a237e; border-bottom: 2px solid #e9ecef; padding-bottom: 15px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full { grid-column: 1 / -1; }
        .form-group label { font-weight: 600; margin-bottom: 6px; color: #555; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea {
            padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; border-color: #1a237e;
        }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .section-title { font-size: 16px; font-weight: 600; color: #1a237e; margin: 25px 0 15px; padding-bottom: 8px; border-bottom: 1px solid #e9ecef; }
        .btn-group { display: flex; gap: 15px; margin-top: 30px; }
        .btn { padding: 12px 30px; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; text-decoration: none; }
        .btn-primary { background: #1a237e; color: white; }
        .btn-primary:hover { background: #283593; }
        .btn-secondary { background: #e9ecef; color: #555; }
        .btn-secondary:hover { background: #dee2e6; }
        .required::after { content: " *"; color: #c62828; }
        .flash { padding: 12px 20px; margin-bottom: 20px; border-radius: 4px; }
        .flash-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .flash-error { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        
        /* Party type tabs */
        .party-type-tabs { display: flex; gap: 20px; margin-bottom: 20px; padding: 10px 0; border-bottom: 1px solid #e9ecef; }
        .party-tab { cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px; color: #555; }
        .party-tab input[type="radio"] { width: 16px; height: 16px; accent-color: #1a237e; }
        .party-tab input[type="radio"]:checked + span { color: #1a237e; font-weight: 600; }
        
        /* Radio group for gender */
        .radio-group { display: flex; gap: 20px; padding: 10px 0; }
        .radio-group label { font-weight: normal; display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .radio-group input[type="radio"] { width: 16px; height: 16px; accent-color: #1a237e; }
        
        /* Tel group */
        .tel-group { display: flex; gap: 8px; }
        .tel-group input { flex: 1; }
    </style>
</head>

        <a href="/">← 返回列表</a>

                        <label>案件名称</label>

                    </div>
                </div>

                        <label>保全类型</label>
                        <select name="preserve_type">

                            <option value="诉前保全">诉前保全</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>案由</label>
                        <input type="text" name="case_reason" placeholder="如：借款合同纠纷">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="required">保全金额（元）</label>
                        <input type="number" name="preserve_amount" placeholder="0.00" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label class="required">受理法院</label>
                        <input type="text" name="court_name" placeholder="如：北京市朝阳区人民法院" required>

                </div>

                    </label>

                        <div class="form-group full">
                            <label class="required">单位地址</label>
                            <input type="text" name="respondent_org_address" placeholder="实际经营地址">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">单位注册地</label>
                            <input type="text" name="respondent_reg_address" placeholder="工商注册地址">
                        </div>
                        <div class="form-group">
                            <label class="required">注册地国别或地区</label>
                            <select name="respondent_reg_country">
                                <option value="中国" selected>中国</option>
                                <option value="中国香港">中国香港</option>
                                <option value="中国澳门">中国澳门</option>
                                <option value="中国台湾省">中国台湾省</option>
                                <option value="美国">美国</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="section-title">担保信息</div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>担保方式 <span style="color:red">*</span></label>
                        <select name="guarantee_type" id="guarantee_type" onchange="toggleGuaranteeFields()">
                            <option value="提供保证人">提供保证人</option>
                            <option value="设定抵押">设定抵押</option>
                            <option value="设定质押">设定质押</option>
                            <option value="交纳保证金">交纳保证金</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>担保价值（元）</label>
                        <input type="number" name="guarantee_value" placeholder="0.00" step="0.01">
                    </div>
                </div>
                
                <div class="form-row" id="guarantor-row">
                    <div class="form-group">
                        <label>保证人姓名</label>
                        <input type="text" name="guarantor_name" placeholder="保证人姓名">
                    </div>
                </div>
                
                <div class="form-row" id="pledge-row" style="display:none;">
                    <div class="form-group">
                        <label>质押财产类型</label>
                        <input type="text" name="pledge_property_type" placeholder="如：股权">
                    </div>
                </div>
                
                <div class="form-row" id="mortgage-row" style="display:none;">
                    <div class="form-group">
                        <label>抵押财产类型</label>
                        <input type="text" name="mortgage_property_type" placeholder="如：房产">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group full">
                        <label>担保财产/对象</label>
                        <input type="text" name="guarantee_object" placeholder="具体担保财产或对象描述">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group full">
                        <label>担保备注</label>
                        <textarea name="guarantee_remark" placeholder="其他担保相关信息"></textarea>
                    </div>
                </div>
                
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">💾 保存案件</button>
                    <a href="/" class="btn btn-secondary">取消</a>
                </div>
            </form>
        </div>
    </div>
    
    <script>
    function toggleApplicantFields() {
        var type = document.querySelector('input[name="applicant_type"]:checked').value;
        if (type === '自然人') {
            document.getElementById('applicant-natural').style.display = 'block';
            document.getElementById('applicant-org').style.display = 'none';
        } else {
            document.getElementById('applicant-natural').style.display = 'none';
            document.getElementById('applicant-org').style.display = 'block';
            // Update label for 法人 vs 非法人组织
            var legalLabel = document.getElementById('applicant-legal-label');
            var legalTitleLabel = document.getElementById('applicant-legal-title-label');
            if (type === '法人') {
                legalLabel.textContent = '法定代表人';
                legalTitleLabel.textContent = '法定代表人职务';
            } else {
                legalLabel.textContent = '主要负责人';
                legalTitleLabel.textContent = '主要负责人职务';
            }
        }
    }
    
    function toggleRespondentFields() {
        var type = document.querySelector('input[name="respondent_type"]:checked').value;
        if (type === '自然人') {
            document.getElementById('respondent-natural').style.display = 'block';
            document.getElementById('respondent-org').style.display = 'none';
        } else {
            document.getElementById('respondent-natural').style.display = 'none';
            document.getElementById('respondent-org').style.display = 'block';
            var legalLabel = document.getElementById('respondent-legal-label');
            var legalTitleLabel = document.getElementById('respondent-legal-title-label');
            if (type === '法人') {
                legalLabel.textContent = '法定代表人';
                legalTitleLabel.textContent = '法定代表人职务';
            } else {
                legalLabel.textContent = '主要负责人';
                legalTitleLabel.textContent = '主要负责人职务';
            }
        }
    }
    
    function toggleGuaranteeFields() {
        var type = document.getElementById('guarantee_type').value;
        document.getElementById('guarantor-row').style.display = (type === '提供保证人') ? 'flex' : 'none';
        document.getElementById('pledge-row').style.display = (type === '设定质押') ? 'flex' : 'none';
        document.getElementById('mortgage-row').style.display = (type === '设定抵押') ? 'flex' : 'none';
    }
    
    // Sync org fields to base fields on submit
    document.getElementById('caseForm').addEventListener('submit', function(e) {
        var appType = document.querySelector('input[name="applicant_type"]:checked').value;
        if (appType !== '自然人') {
            document.querySelector('input[name="applicant_name"]').value = document.querySelector('input[name="applicant_org_name"]').value;
            document.querySelector('input[name="applicant_cert_type"]').value = document.querySelector('select[name="applicant_org_cert_type"]').value;
            document.querySelector('input[name="applicant_uscc"]').value = document.querySelector('input[name="applicant_org_cert_no"]').value;
            document.querySelector('input[name="applicant_phone"]').value = document.querySelector('input[name="applicant_org_phone"]').value;
            document.querySelector('input[name="applicant_address"]').value = document.querySelector('input[name="applicant_org_address"]').value;
        }
        var respType = document.querySelector('input[name="respondent_type"]:checked').value;
        if (respType !== '自然人') {
            document.querySelector('input[name="respondent_name"]').value = document.querySelector('input[name="respondent_org_name"]').value;
            document.querySelector('input[name="respondent_cert_type"]').value = document.querySelector('select[name="respondent_org_cert_type"]').value;
            document.querySelector('input[name="respondent_uscc"]').value = document.querySelector('input[name="respondent_org_cert_no"]').value;
            document.querySelector('input[name="respondent_phone"]').value = document.querySelector('input[name="respondent_org_phone"]').value;
            document.querySelector('input[name="respondent_address"]').value = document.querySelector('input[name="respondent_org_address"]').value;
        }
    });
    </script>
</body>
</html>
