<!-- 添加财产线索表单 -->
                <h4 style="color: #1a237e; margin-bottom: 15px;">➕ 添加财产线索</h4>
                <form method="POST" action="/case/{{ case.id }}/property/add" id="propertyForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>财产类型 *</label>
                            <select name="property_type" id="propertyType" required onchange="togglePropertyFields()">
                                <option value="存款">存款</option>
                                <option value="房产">房产</option>
                                <option value="土地使用权">土地使用权</option>
                                <option value="集体土地所有权">集体土地所有权</option>
                                <option value="森林、林木所有权">森林、林木所有权</option>
                                <option value="船舶">船舶</option>
                                <option value="珠宝玉石首饰">珠宝玉石首饰</option>
                                <option value="债权">债权</option>
                                <option value="知识产权">知识产权</option>
                                <option value="股权">股权</option>
                                <option value="股票">股票</option>
                                <option value="基金">基金</option>
                                <option value="债券">债券</option>
                                <option value="交通运输工具">交通运输工具</option>
                                <option value="机器设备">机器设备</option>
                                <option value="货币现金">货币现金</option>
                                <option value="产品、原材料">产品、原材料</option>
                                <option value="探矿、采矿权">探矿、采矿权</option>
                                <option value="古玩字画">古玩字画</option>
                                <option value="留置的货物">留置的货物</option>
                                <option value="船用物料">船用物料</option>
                                <option value="船用燃料">船用燃料</option>
                                <option value="船载货物">船载货物</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>财产所有人 *</label>
                            <input type="text" name="owner" placeholder="请选择财产所有人" required>
                        </div>
                        <div class="form-group">
                            <label>财产价值 *</label>
                            <input type="number" name="property_value" placeholder="0.00" step="0.01" required>
                        </div>
                    </div>

                    <!-- 存款/货币现金 专用字段 -->
                    <div class="form-row prop-group" data-types="存款,货币现金">
                        <div class="form-group">
                            <label>开户行所在地</label>
                            <input type="text" name="property_province" placeholder="如：广东省">
                        </div>
                        <div class="form-group">
                            <label>开户银行名称</label>
                            <input type="text" name="bank_name" placeholder="银行名称">
                        </div>
                        <div class="form-group">
                            <label>开户账号</label>
                            <input type="text" name="bank_account" placeholder="账号">
                        </div>
                    </div>
                    <div class="form-row prop-group" data-types="存款,货币现金">
                        <div class="form-group">
                            <label>数额</label>
                            <input type="number" name="amount" placeholder="0.00" step="0.01">
                        </div>
                        <div class="form-group">
                            <label>币种</label>
                            <select name="currency">
                                <option value="CNY">人民币</option>
                                <option value="USD">美元</option>
                                <option value="HKD">港币</option>
                                <option value="EUR">欧元</option>
                            </select>
                        </div>
                        <div class="form-group"></div>
                    </div>

                    <!-- 房产/土地使用权 专用字段 -->
                    <div class="form-row prop-group" data-types="房产,土地使用权">
                        <div class="form-group">
                            <label>所在省份</label>
                            <input type="text" name="property_province" placeholder="如：广东省">
                        </div>
                        <div class="form-group">
                            <label>所在城市</label>
                            <input type="text" name="property_city" placeholder="如：深圳市">
                        </div>
                        <div class="form-group">
                            <label>详细位置</label>
                            <input type="text" name="property_location" placeholder="财产所在位置">
                        </div>
                    </div>
                    <div class="form-row prop-group" data-types="房产,土地使用权">
                        <div class="form-group">
                            <label>产权证号</label>
                            <input type="text" name="property_cert_no" placeholder="房产证号等">
                        </div>
                        <div class="form-group">
                            <label>详细地址</label>
                            <input type="text" name="property_detail_location" placeholder="具体地址">
                        </div>
                        <div class="form-group"></div>
                    </div>

                    <!-- 土地使用权 面积字段 -->
                    <div class="form-row prop-group" data-types="土地使用权">
                        <div class="form-group">
                            <label>面积</label>
                            <input type="number" name="property_area" placeholder="0.00" step="0.01">
                        </div>
                        <div class="form-group">
                            <label>单位</label>
                            <select name="property_area_unit">
                                <option value="平方米">平方米</option>
                                <option value="亩">亩</option>
                                <option value="公顷">公顷</option>
                            </select>
                        </div>
                        <div class="form-group"></div>
                    </div>

                    <!-- 股权 专用字段 -->
                    <div class="form-row prop-group" data-types="股权">
                        <div class="form-group">
                            <label>发行单位注册地</label>
                            <input type="text" name="stock_reg_location" placeholder="如：广东省">
                        </div>
                        <div class="form-group">
                            <label>持股公司名称</label>
                            <input type="text" name="stock_company_name" placeholder="持股公司名称">
                        </div>
                        <div class="form-group">
                            <label>出资比例(%)</label>
                            <input type="number" name="stock_ratio" placeholder="0" step="0.01">
                        </div>
                    </div>

                    <!-- 股票 专用字段 -->
                    <div class="form-row prop-group" data-types="股票">
                        <div class="form-group">
                            <label>发行单位注册地</label>
                            <input type="text" name="stock_reg_location" placeholder="如：广东省">
                        </div>
                        <div class="form-group">
                            <label>股票名称</label>
                            <input type="text" name="stock_name" placeholder="股票名称">
                        </div>
                        <div class="form-group">
                            <label>股票代码</label>
                            <input type="text" name="stock_code" placeholder="股票代码">
                        </div>
                    </div>
                    <div class="form-row prop-group" data-types="股票">
                        <div class="form-group">
                            <label>持股数量</label>
                            <input type="number" name="stock_quantity" placeholder="0">
                        </div>
                        <div class="form-group"></div>
                        <div class="form-group"></div>
                    </div>

                    <!-- 基金 专用字段 -->
                    <div class="form-row prop-group" data-types="基金">
                        <div class="form-group">
                            <label>发行单位注册地</label>
                            <input type="text" name="stock_reg_location" placeholder="如：广东省">
                        </div>
                        <div class="form-group">
                            <label>基金名称</label>
                            <input type="text" name="fund_name" placeholder="基金名称">
                        </div>
                        <div class="form-group">
                            <label>基金数量</label>
                            <input type="number" name="fund_quantity" placeholder="0">
                        </div>
                    </div>

                    <!-- 债券 专用字段 -->
                    <div class="form-row prop-group" data-types="债券">
                        <div class="form-group">
                            <label>发行单位注册地</label>
                            <input type="text" name="stock_reg_location" placeholder="如：广东省">
                        </div>
                        <div class="form-group">
                            <label>债券名称</label>
                            <input type="text" name="bond_name" placeholder="债券名称">
                        </div>
                        <div class="form-group">
                            <label>债券面值(元)</label>
                            <input type="number" name="bond_face_value" placeholder="0.00" step="0.01">
                        </div>
                    </div>

                    <!-- 交通运输工具 专用字段 -->
                    <div class="form-row prop-group" data-types="交通运输工具">
                        <div class="form-group">
                            <label>车辆归属地</label>
                            <input type="text" name="vehicle_location" placeholder="如：广东省深圳市">
                        </div>
                        <div class="form-group">
                            <label>车辆品牌型号</label>
                            <input type="text" name="vehicle_brand_model" placeholder="如：宝马X5">
                        </div>
                        <div class="form-group">
                            <label>车辆类型</label>
                            <input type="text" name="vehicle_type" placeholder="如：小型轿车">
                        </div>
                    </div>
                    <div class="form-row prop-group" data-types="交通运输工具">
                        <div class="form-group">
                            <label>车牌号</label>
                            <input type="text" name="vehicle_plate_no" placeholder="如：粤B12345">
                        </div>
                        <div class="form-group"></div>
                        <div class="form-group"></div>
                    </div>

                    <!-- 机器设备 专用字段 -->
                    <div class="form-row prop-group" data-types="机器设备">
                        <div class="form-group">
                            <label>设备名称</label>
                            <input type="text" name="equipment_name" placeholder="设备名称">
                        </div>
                        <div class="form-group"></div>
                        <div class="form-group"></div>
                    </div>

                    <!-- 描述字段 (适用于没有专用字段的类型) -->
                    <div class="form-row prop-group" data-types="集体土地所有权,森林、林木所有权,船舶,珠宝玉石首饰,债权,知识产权,产品、原材料,探矿、采矿权,古玩字画,留置的货物,船用物料,船用燃料,船载货物,其他">
                        <div class="form-group" style="grid-column: span 3;">
                            <label>描述</label>
                            <input type="text" name="description" placeholder="请描述该财产的详细信息">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success">💾 添加财产线索</button>
                </form>

                <script>
                function togglePropertyFields() {
                    var selectedType = document.getElementById('propertyType').value;
                    var groups = document.querySelectorAll('.prop-group');
                    groups.forEach(function(group) {
                        var types = group.getAttribute('data-types').split(',');
                        if (types.includes(selectedType)) {
                            group.style.display = 'grid';
                        } else {
                            group.style.display = 'none';
                            group.querySelectorAll('input, select').forEach(function(input) {
                                if (input.type !== 'button') {
                                    input.value = '';
                                }
                            });
                        }
                    });
                }
                document.addEventListener('DOMContentLoaded', togglePropertyFields);
                </script>

                <hr style="margin: 25px 0; border: none; border-top: 1px solid #e9ecef;">
